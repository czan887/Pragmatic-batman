name: Build Windows EXE

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }

      - name: Build EXE
        run: |
          pyinstaller --onefile --name="X_BOT" main.py

      - name: Get current date
        id: date
        run: echo "date=$(Get-Date -Format 'yyyy-MM-dd-HH-mm')" >> $env:GITHUB_OUTPUT

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.date.outputs.date }}"
          name: "X_BOT"
          body: |
            Automated build from commit ${{ github.sha }}
            
            ## Changes
            - Latest updates from main branch
            
            ## Download
            Download the `X_BOT.exe` file from the assets below.
          files: dist/X_BOT.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}